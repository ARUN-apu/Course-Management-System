<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Course Management System</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-amber-200 px-6 md:px-10 py-4 flex justify-between items-center">
        <h1 class="text-xl md:text-2xl font-bold">Course Management System</h1>
        <div class="flex gap-3">
            <button id="loginBtn" class="bg-black text-white px-4 py-2 rounded cursor-pointer">Login</button>
            <button id="registerBtn" class="bg-black text-white px-4 py-2 rounded cursor-pointer">Register</button>
        </div>
    </nav>

    <!-- main section -->
    <div class="bg-blue-200 py-20 px-6 text-center mx-10 mt-10">
        <h2 class="text-2xl md:text-4xl font-bold mb-4">Start Learning Today</h2>
        <p class="md:text-lg mb-8">Enroll course and start your learning today</p>
        <div class="mb-6 flex justify-center">
            <input type="text" id="searchInput" placeholder="Search courses..."
                class="border px-4 py-2 rounded-lg w-full md:w-1/2" />
        </div>

    </div>
    <div class="max-w-6xl mx-auto px-4 py-10 flex-1">
        <h3 class="text-2xl font-bold text-center mt-8 mb-4 underline">Courses</h3>
        <div id="coursesList" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto px-4 mb-10"></div>
    </div>

    <footer class="bg-amber-200 p-8 px-20">
        <div class="p-10">
            <div class="flex flex-col md:flex-row items-center justify-center gap-x-10 gap-y-10 md:gap-y-0">
                <div class=" md:mx-auto mx-15">
                    <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Phone Support</h3>
                    <p class="text-left font-lg text-bluegray">24/7 Call us now.</p>
                    <p class="text-left font-lg text-bluegray"><a href="tel://">+91 8101436009</a></p>
                </div>
                <div class=" md:mx-auto mx-16">
                    <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Connect With Us</h3>
                    <p class="text-left font-lg text-bluegray">We are socialized. Follow us</p>
                    <p class="text-left font-lg text-darkbluegray">
                        <a href="#" class=""><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-twitter"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-youtube"></i></a>
                    </p>
                </div>
                <div class="md:mx-auto mx-20 flex md:flex-row flex-col items-center md:justify-normal justify-center">
                    <div class="md:mx-auto mx-10">
                        <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Connect With Us</h3>
                        <p class="text-left font-lg text-bluegray">India's Best Learning Website</p>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script type="module" src="./dist/scripts/main.js"></script>
    <script type="module" src="./dist/scripts/index.js"></script>
</body>

</html>
