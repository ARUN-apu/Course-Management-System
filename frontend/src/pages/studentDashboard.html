<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../dist/output.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Student Dashboard</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <div id="navbar"></div>
    <div class="flex flex-1">
        <div class="flex-1 p-4 md:p-8">
            <div id="dashboardSection">
                <h2 class="text-2xl font-bold mb-2">Student Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-white rounded-lg shadow p-6">
                        <p class="text-gray-500 text-sm">Total Enrolled Courses</p>
                        <h3 id="totalEnrolled" class="text-3xl font-bold  mt-1">0</h3>
                    </div>
                </div>

                <h3 class="text-xl font-bold mb-4">Available Courses</h3>
                <div class="mb-4">
                    <input type="text" id="searchInput" placeholder="Search courses..."
                        class="border px-4 py-2 rounded-lg w-full md:w-1/4">
                </div>
                <div id="coursesList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="enrolledSection" class="hidden">
                <h2 class="text-2xl font-bold mb-6">My Enrollments</h2>
                <div id="enrolledList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <!-- profile section -->
            <div id="profileSection" class="hidden">
                <div class="max-w-lg mx-auto">
                    <h2 class="text-2xl font-bold mb-6">My Profile</h2>
                    <div class="bg-white rounded-lg shadow p-8">

                        <!-- profile picture -->
                        <div class="flex flex-col items-center mb-6">
                            <img src="../../assets/avatar.png" class="w-24 h-24 rounded-full object-cover mb-3">
                            <p id="profileAvatarName" class="font-semibold text-lg"></p>
                            <p id="profileAvatarRole" class="text-sm text-gray-500"></p>
                        </div>

                        <hr class="mb-6">
                        <div class="flex flex-col gap-4">
                            <div>
                                <label class="text-sm text-gray-500">Full Name</label>
                                <input type="text" id="profileName" class="border px-4 py-2 rounded-lg w-full mt-1">
                            </div>
                            <div>
                                <label class="text-sm text-gray-500">Email</label>
                                <input type="text" id="profileEmail"
                                    class="border px-4 py-2 rounded-lg w-full mt-1 bg-gray-100 cursor-not-allowed"
                                    disabled>
                            </div>
                            <div>
                                <label class="text-sm text-gray-500">Role</label>
                                <input type="text" id="profileRole"
                                    class="border px-4 py-2 rounded-lg w-full mt-1 bg-gray-100 cursor-not-allowed"
                                    disabled>
                            </div>
                            <div>
                                <label class="text-sm text-gray-500">Created at</label>
                                <input type="text" id="profileCreated"
                                    class="border px-4 py-2 rounded-lg w-full mt-1 bg-gray-100 cursor-not-allowed"
                                    disabled>
                            </div>

                            <hr>
                            <h3 class="font-semibold">Change Password</h3>
                            <div>
                                <label class="text-sm text-gray-500">New Password</label>
                                <input type="password" id="profileNewPassword"
                                    class="border px-4 py-2 rounded-lg w-full mt-1" placeholder="Enter new password">
                            </div>
                            <div>
                                <label class="text-sm text-gray-500">Confirm Password</label>
                                <input type="password" id="profileConfirmPassword"
                                    class="border px-4 py-2 rounded-lg w-full mt-1" placeholder="Confirm new password">
                            </div>
                            <button id="saveProfileBtn"
                                class="bg-black text-white px-4 py-2 rounded-lg w-full">Save</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer class="bg-amber-200 p-8 px-20">
        <div class="p-10">
            <div class="flex flex-col md:flex-row items-center justify-center gap-x-10 gap-y-10 md:gap-y-0">
                <div class=" md:mx-auto mx-15">
                    <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Phone Support</h3>
                    <p class="text-left font-lg text-bluegray">24/7 Call us now.</p>
                    <p class="text-left font-lg text-bluegray"><a href="tel://">+91 8101436009</a></p>
                </div>
                <div class=" md:mx-auto mx-16">
                    <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Connect With Us</h3>
                    <p class="text-left font-lg text-bluegray">We are socialized. Follow us</p>
                    <p class="text-left font-lg text-darkbluegray">
                        <a href="#" class=""><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-twitter"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class=""><i class="fa-brands fa-youtube"></i></a>
                    </p>
                </div>
                <div class="md:mx-auto mx-20 flex md:flex-row flex-col items-center md:justify-normal justify-center">
                    <div class="md:mx-auto mx-10">
                        <h3 class="text-left text-darkbluegray text-1-1xl font-semibold">Connect With Us</h3>
                        <p class="text-left font-lg text-bluegray">India's Best Learning Website</p>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script type="module" src="../../dist/scripts/main.js" defer></script>
    <script type="module" src="../../dist/scripts/studentDashboard.js" defer></script>
</body>

</html>
